name: Bug report
description: Something does not build or run as documented on `main`.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Default expectation:** `main` builds the **slim** set (UiMenu, ParticleShowcase, two games) with MSVC + CMake as in the root **README.md** (Quick start). Please confirm you followed that before filing.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences — what went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Commands you ran (configure line, build target, exe + flags).
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or branch
      description: e.g. `main` @ `abc1234`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS build, VS / CMake / Vulkan SDK versions if relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste the first ~40 lines of the error, or attach a screenshot for UI issues.
