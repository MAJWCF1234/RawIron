# Slim default build on Windows (matches root README Quick start).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-slim:
    name: Windows MSVC (slim targets)
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # v1.2+ uses actions/cache@v4; v1.1.1 used cache@v2 (GitHub auto-fails that at action resolve time).
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true
          quiet: true

      - name: MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # LunarG layout on CI is often VULKAN_SDK/<ver>/Include (not VULKAN_SDK/Include). Resolve from vulkan.h + vulkan-1.lib.
      - name: Configure CMake (preset dev-msvc)
        shell: pwsh
        run: |
          $vk = $env:VULKAN_SDK.TrimEnd('\')
          if (-not $vk) { throw 'VULKAN_SDK missing after Vulkan install step' }
          $vkH = Get-ChildItem -LiteralPath $vk -Recurse -Filter 'vulkan.h' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '[\\/]include[\\/]vulkan[\\/]vulkan\.h$' } | Select-Object -First 1
          if (-not $vkH) {
            Write-Host 'VULKAN_SDK=' $vk
            Get-ChildItem -LiteralPath $vk -Recurse -Filter 'vulkan.h' -ErrorAction SilentlyContinue | Select-Object -First 20 FullName
            throw 'vulkan.h not found under VULKAN_SDK'
          }
          $inc = (Resolve-Path (Join-Path $vkH.Directory.FullName '..')).Path
          $libItem = Get-ChildItem -LiteralPath $vk -Recurse -Filter 'vulkan-1.lib' -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $libItem) {
            Write-Host 'VULKAN_SDK=' $vk
            Get-ChildItem -LiteralPath $vk -Recurse -Filter '*.lib' -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
            throw 'vulkan-1.lib not found under VULKAN_SDK'
          }
          $lib = $libItem.FullName
          $incF = $inc -replace '\\','/'
          $libF = $lib -replace '\\','/'
          cmake --preset dev-msvc "-DVulkan_INCLUDE_DIR=$incF" "-DVulkan_LIBRARY=$libF"

      - name: Build slim default targets
        shell: pwsh
        run: |
          cmake --build build/dev-msvc --config RelWithDebInfo --parallel `
            --target RawIron.UiMenu RawIron.ParticleShowcase RawIron.LiminalGame RawIron.ForestRuinsGame

      - name: UiMenu headless smoke
        shell: pwsh
        run: |
          $exe = Join-Path "${{ github.workspace }}" "build/dev-msvc/Apps/RawIron.UiMenu/RelWithDebInfo/RawIron.UiMenu.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing $exe" }
          & $exe --workspace="${{ github.workspace }}" --headless
          if ($LASTEXITCODE -ne 0) { throw "UiMenu --headless exited $LASTEXITCODE" }
